<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom GS View Exporter</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #e5e7eb;
      --accent: #f97316;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #1d4ed8 0%, #0b1022 42%, #020617 100%);
      overflow: hidden;
    }
    #app { display: grid; grid-template-columns: 360px 1fr; height: 100%; }
    #left {
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.92), rgba(31, 41, 55, 0.75));
      border-right: 1px solid rgba(229, 231, 235, 0.1);
      padding: 18px;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
      overflow-y: auto;
    }
    h1 { margin: 0 0 12px 0; font-size: 20px; line-height: 1.2; font-weight: 700; }
    p { font-size: 13px; line-height: 1.45; margin: 0 0 12px 0; opacity: 0.92; }
    .block {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(17, 24, 39, 0.72);
      border: 1px solid rgba(229, 231, 235, 0.12);
    }
    label { display: block; font-size: 12px; margin-bottom: 6px; opacity: 0.9; }
    input[type="file"], input[type="range"], input[type="text"], button { width: 100%; box-sizing: border-box; }
    input[type="text"] {
      border: 1px solid rgba(229, 231, 235, 0.2);
      border-radius: 8px;
      padding: 10px;
      color: var(--text);
      background: rgba(31, 41, 55, 0.8);
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px;
      background: linear-gradient(90deg, #ea580c, #f97316);
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { filter: brightness(1.05); }
    .button-secondary { background: linear-gradient(90deg, #1f2937, #374151); }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 13px; margin: 6px 0; }
    .row button { margin-top: 0; }
    .status { font-size: 12px; line-height: 1.45; opacity: 0.9; word-break: break-word; white-space: pre-wrap; }
    #viewport { position: relative; width: 100%; height: 100%; }
    canvas { display: block; width: 100%; height: 100%; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; line-height: 1.4; white-space: pre-wrap; }
    @media (max-width: 900px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      #left { border-right: 0; border-bottom: 1px solid rgba(229, 231, 235, 0.1); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="left">
      <h1>Custom GS View Exporter</h1>
      <p>Move to any view, then save it directly into a folder. The server will write the camera JSON and render the exact GS image, mask template, and camera metadata into that folder.</p>

      <div class="block">
        <button id="loadDefaultBtn" type="button">Load `gs_ply/0000.ply`</button>
        <label for="fileInput" style="margin-top:8px;">Or open another local `.ply` / `.gsply`</label>
        <input id="fileInput" type="file" accept=".ply,.gsply" />
      </div>

      <div class="block">
        <label for="saveDirInput">Save folder</label>
        <input id="saveDirInput" type="text" value="output/column/custom_view" />
        <label for="nameInput">Camera export name</label>
        <input id="nameInput" type="text" value="custom_view_0000" />
        <div class="row" style="margin-top:8px;">
          <button id="saveViewBtn" type="button">Save View</button>
          <button id="exportCameraBtn" type="button">Download Camera JSON</button>
        </div>
        <button id="copyCameraBtn" type="button" class="button-secondary">Copy JSON</button>
        <button id="downloadPreviewBtn" type="button" class="button-secondary">Download Viewer Preview PNG</button>
      </div>

      <div class="block">
        <div class="row">
          <label for="maskToggle" style="margin:0">Damage Mask Mode</label>
          <input id="maskToggle" type="checkbox" style="width:auto" />
        </div>
        <button id="maskToggleBtn" type="button">Damage Mask: OFF</button>
        <div class="row" style="margin-top:8px;">
          <button id="zoomInBtn" type="button">Zoom In</button>
          <button id="zoomOutBtn" type="button">Zoom Out</button>
        </div>
        <label for="sizeRange">Point size</label>
        <input id="sizeRange" type="range" min="0.5" max="8" step="0.1" value="1.8" />
      </div>

      <div class="block status" id="status">No file loaded.</div>
      <div class="block mono" id="cameraInfo">Camera not exported yet.</div>
    </div>

    <div id="viewport"><canvas id="glcanvas"></canvas></div>
  </div>

  <script>
    const MAX_RENDER_POINTS = 800000;
    const VIEW_FOVY_DEG = 60.0;

    const fileInput = document.getElementById('fileInput');
    const loadDefaultBtn = document.getElementById('loadDefaultBtn');
    const exportCameraBtn = document.getElementById('exportCameraBtn');
    const saveViewBtn = document.getElementById('saveViewBtn');
    const copyCameraBtn = document.getElementById('copyCameraBtn');
    const downloadPreviewBtn = document.getElementById('downloadPreviewBtn');
    const saveDirInput = document.getElementById('saveDirInput');
    const nameInput = document.getElementById('nameInput');
    const maskToggle = document.getElementById('maskToggle');
    const maskToggleBtn = document.getElementById('maskToggleBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const sizeRange = document.getElementById('sizeRange');
    const statusEl = document.getElementById('status');
    const cameraInfoEl = document.getElementById('cameraInfo');
    const canvas = document.getElementById('glcanvas');

    let gl, program;
    let posBuf, colBuf, maskBuf;
    let pointCount = 0;
    let hasData = false;
    let loadedSource = 'none';

    let yaw = 0.0;
    let pitch = 0.0;
    let dist = 4.0;
    let sceneRadius = 1.0;
    let target = [0, 0, 0];
    let lastX = 0, lastY = 0, dragging = false;
    let dragMode = 'rotate';

    function setStatus(text) { statusEl.textContent = text; }
    function sigmoid(x) { return 1.0 / (1.0 + Math.exp(-x)); }
    function toColor01(v) { return v > 1 ? Math.max(0, Math.min(1, v / 255)) : Math.max(0, Math.min(1, v)); }
    function applyMaskMode() { maskToggleBtn.textContent = `Damage Mask: ${maskToggle.checked ? 'ON' : 'OFF'}`; }

    function sanitizeStem(name) {
      const trimmed = (name || '').trim() || 'custom_view';
      return trimmed.replace(/[^a-zA-Z0-9._-]+/g, '_');
    }

    function zoomBy(scale) {
      const minDist = Math.max(sceneRadius * 0.00005, 0.0002);
      const maxDist = Math.max(sceneRadius * 200.0, 1e4);
      dist = Math.max(minDist, Math.min(maxDist, dist * scale));
    }

    function findMaskProperty(propertyNames) {
      const candidates = ['mask', 'damage_mask', 'damage', 'is_mask', 'label', 'seg'];
      const lower = propertyNames.map((p) => p.toLowerCase());
      for (const c of candidates) {
        const i = lower.indexOf(c);
        if (i !== -1) return propertyNames[i];
      }
      for (let i = 0; i < lower.length; i++) {
        if (lower[i].includes('mask') || lower[i].includes('damage')) return propertyNames[i];
      }
      return null;
    }

    function parseHeader(text) {
      const end = text.indexOf('end_header');
      if (end < 0) throw new Error('Invalid PLY: no end_header');
      const header = text.slice(0, end + 'end_header'.length);
      const lines = header.split(/\r?\n/);
      let format = null;
      let vertexCount = 0;
      let inVertex = false;
      const vertexProps = [];
      let headerByteLength = new TextEncoder().encode(header).length;
      const after = text.slice(end + 'end_header'.length, end + 'end_header'.length + 2);
      if (after.startsWith('\r\n')) headerByteLength += 2;
      else if (after.startsWith('\n')) headerByteLength += 1;
      for (const lineRaw of lines) {
        const line = lineRaw.trim();
        if (!line) continue;
        const parts = line.split(/\s+/);
        if (parts[0] === 'format') format = parts[1];
        else if (parts[0] === 'element') {
          inVertex = parts[1] === 'vertex';
          if (inVertex) vertexCount = Number(parts[2]);
        } else if (parts[0] === 'property' && inVertex) {
          if (parts[1] === 'list') continue;
          vertexProps.push({ type: parts[1], name: parts[2] });
        }
      }
      if (!format || !vertexCount || !vertexProps.length) throw new Error('Unsupported PLY header');
      return { format, vertexCount, vertexProps, headerByteLength };
    }

    function getTypedReader(type) {
      switch (type) {
        case 'char': case 'int8': return { size: 1, fn: (dv, o) => dv.getInt8(o) };
        case 'uchar': case 'uint8': return { size: 1, fn: (dv, o) => dv.getUint8(o) };
        case 'short': case 'int16': return { size: 2, fn: (dv, o) => dv.getInt16(o, true) };
        case 'ushort': case 'uint16': return { size: 2, fn: (dv, o) => dv.getUint16(o, true) };
        case 'int': case 'int32': return { size: 4, fn: (dv, o) => dv.getInt32(o, true) };
        case 'uint': case 'uint32': return { size: 4, fn: (dv, o) => dv.getUint32(o, true) };
        case 'float': case 'float32': return { size: 4, fn: (dv, o) => dv.getFloat32(o, true) };
        case 'double': case 'float64': return { size: 8, fn: (dv, o) => dv.getFloat64(o, true) };
        default: throw new Error('Unsupported property type: ' + type);
      }
    }

    function parseBinaryVertices(buffer, header) {
      const { vertexProps, vertexCount, headerByteLength } = header;
      const readers = vertexProps.map((p) => ({ ...p, ...getTypedReader(p.type) }));
      const idx = Object.fromEntries(vertexProps.map((p, i) => [p.name, i]));
      const px = idx.x, py = idx.y, pz = idx.z;
      if (px === undefined || py === undefined || pz === undefined) throw new Error('Vertex properties must include x y z');
      const rIdx = idx.red ?? idx.r ?? idx.f_dc_0;
      const gIdx = idx.green ?? idx.g ?? idx.f_dc_1;
      const bIdx = idx.blue ?? idx.b ?? idx.f_dc_2;
      const isFdcColor = (rIdx === idx.f_dc_0) && (gIdx === idx.f_dc_1) && (bIdx === idx.f_dc_2);
      const maskName = findMaskProperty(vertexProps.map((p) => p.name));
      const maskIdx = maskName ? idx[maskName] : undefined;
      const stride = Math.max(1, Math.ceil(vertexCount / MAX_RENDER_POINTS));
      const outCount = Math.ceil(vertexCount / stride);
      const pos = new Float32Array(outCount * 3);
      const col = new Float32Array(outCount * 3);
      const mask = new Float32Array(outCount);
      const dv = new DataView(buffer);
      let off = headerByteLength;
      let oi = 0;
      for (let i = 0; i < vertexCount; i++) {
        const vals = new Array(readers.length);
        for (let p = 0; p < readers.length; p++) {
          const rd = readers[p];
          vals[p] = rd.fn(dv, off);
          off += rd.size;
        }
        if ((i % stride) !== 0) continue;
        pos[oi * 3] = Number(vals[px]);
        pos[oi * 3 + 1] = Number(vals[py]);
        pos[oi * 3 + 2] = Number(vals[pz]);
        let r = 0.8, g = 0.8, b = 0.8;
        if (rIdx !== undefined && gIdx !== undefined && bIdx !== undefined) {
          if (isFdcColor) {
            r = sigmoid(Number(vals[rIdx]));
            g = sigmoid(Number(vals[gIdx]));
            b = sigmoid(Number(vals[bIdx]));
          } else {
            r = toColor01(Number(vals[rIdx]));
            g = toColor01(Number(vals[gIdx]));
            b = toColor01(Number(vals[bIdx]));
          }
        }
        col[oi * 3] = r;
        col[oi * 3 + 1] = g;
        col[oi * 3 + 2] = b;
        if (maskIdx !== undefined) mask[oi] = Number(vals[maskIdx]) > 0 ? 1 : 0;
        oi += 1;
      }
      return { pos, col, mask, maskName: maskName ?? 'none', sourceCount: vertexCount, sampleStride: stride };
    }

    function parseAsciiVertices(bodyText, props, vertexCount) {
      const lines = bodyText.trim().split(/\r?\n/);
      if (lines.length < vertexCount) throw new Error('ASCII vertex lines fewer than expected');
      const idx = Object.fromEntries(props.map((p, i) => [p.name, i]));
      const px = idx.x, py = idx.y, pz = idx.z;
      if (px === undefined || py === undefined || pz === undefined) throw new Error('Vertex properties must include x y z');
      const rIdx = idx.red ?? idx.r ?? idx.f_dc_0;
      const gIdx = idx.green ?? idx.g ?? idx.f_dc_1;
      const bIdx = idx.blue ?? idx.b ?? idx.f_dc_2;
      const isFdcColor = (rIdx === idx.f_dc_0) && (gIdx === idx.f_dc_1) && (bIdx === idx.f_dc_2);
      const maskName = findMaskProperty(props.map((p) => p.name));
      const maskIdx = maskName ? idx[maskName] : undefined;
      const stride = Math.max(1, Math.ceil(vertexCount / MAX_RENDER_POINTS));
      const outCount = Math.ceil(vertexCount / stride);
      const pos = new Float32Array(outCount * 3);
      const col = new Float32Array(outCount * 3);
      const mask = new Float32Array(outCount);
      let oi = 0;
      for (let i = 0; i < vertexCount; i += stride) {
        const parts = lines[i].trim().split(/\s+/);
        pos[oi * 3] = Number(parts[px]);
        pos[oi * 3 + 1] = Number(parts[py]);
        pos[oi * 3 + 2] = Number(parts[pz]);
        let r = 0.8, g = 0.8, b = 0.8;
        if (rIdx !== undefined && gIdx !== undefined && bIdx !== undefined) {
          if (isFdcColor) {
            r = sigmoid(Number(parts[rIdx]));
            g = sigmoid(Number(parts[gIdx]));
            b = sigmoid(Number(parts[bIdx]));
          } else {
            r = toColor01(Number(parts[rIdx]));
            g = toColor01(Number(parts[gIdx]));
            b = toColor01(Number(parts[bIdx]));
          }
        }
        col[oi * 3] = r;
        col[oi * 3 + 1] = g;
        col[oi * 3 + 2] = b;
        if (maskIdx !== undefined) mask[oi] = Number(parts[maskIdx]) > 0 ? 1 : 0;
        oi += 1;
      }
      return { pos, col, mask, maskName: maskName ?? 'none', sourceCount: vertexCount, sampleStride: stride };
    }

    function vec3Sub(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
    function vec3Cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
    function vec3Dot(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
    function vec3Norm(a) { const n=Math.hypot(a[0],a[1],a[2]) || 1e-8; return [a[0]/n,a[1]/n,a[2]/n]; }

    function mat4Mul(a, b) {
      const o = new Float32Array(16);
      for (let c = 0; c < 4; c++) {
        for (let r = 0; r < 4; r++) {
          o[c * 4 + r] =
            a[0 * 4 + r] * b[c * 4 + 0] +
            a[1 * 4 + r] * b[c * 4 + 1] +
            a[2 * 4 + r] * b[c * 4 + 2] +
            a[3 * 4 + r] * b[c * 4 + 3];
        }
      }
      return o;
    }

    function mat4Perspective(fovyRad, aspect, near, far) {
      const f = 1.0 / Math.tan(fovyRad / 2.0);
      const o = new Float32Array(16);
      o[0] = f / aspect;
      o[5] = f;
      o[10] = (far + near) / (near - far);
      o[11] = -1.0;
      o[14] = (2.0 * far * near) / (near - far);
      o[15] = 0.0;
      return o;
    }

    function mat4LookAt(eye, center, up) {
      const f = vec3Norm(vec3Sub(center, eye));
      let s = vec3Norm(vec3Cross(f, up));
      const u = vec3Cross(s, f);
      if (Math.hypot(s[0], s[1], s[2]) < 1e-6) s = [1, 0, 0];
      const o = new Float32Array(16);
      o[0] = s[0];   o[1] = s[1];   o[2] = s[2];   o[3] = 0.0;
      o[4] = u[0];   o[5] = u[1];   o[6] = u[2];   o[7] = 0.0;
      o[8] = -f[0];  o[9] = -f[1];  o[10] = -f[2]; o[11] = 0.0;
      o[12] = -vec3Dot(s, eye);
      o[13] = -vec3Dot(u, eye);
      o[14] = vec3Dot(f, eye);
      o[15] = 1.0;
      return o;
    }

    function compileShader(type, src) {
      const sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) throw new Error('Shader compile error: ' + gl.getShaderInfoLog(sh));
      return sh;
    }

    function initGL() {
      gl = canvas.getContext('webgl', { antialias: true, alpha: false, preserveDrawingBuffer: true });
      if (!gl) throw new Error('WebGL not supported');
      const vs = `
        attribute vec3 aPos;
        attribute vec3 aCol;
        attribute float aMask;
        uniform mat4 uMVP;
        uniform float uPointSize;
        varying vec3 vCol;
        varying float vMask;
        void main() {
          vec4 clip = uMVP * vec4(aPos, 1.0);
          gl_Position = clip;
          gl_PointSize = uPointSize * clamp(220.0 / max(0.8, clip.w), 0.8, 32.0);
          vCol = aCol;
          vMask = aMask;
        }
      `;
      const fs = `
        precision mediump float;
        varying vec3 vCol;
        varying float vMask;
        uniform int uMaskMode;
        void main() {
          vec2 c = gl_PointCoord - vec2(0.5);
          if (dot(c,c) > 0.25) discard;
          vec3 outColor = vCol;
          float alpha = 0.95;
          if (uMaskMode == 1) {
            if (vMask < 0.5) discard;
            outColor = vec3(1.0, 0.15, 0.15);
            alpha = 1.0;
          }
          gl_FragColor = vec4(outColor, alpha);
        }
      `;
      program = gl.createProgram();
      gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) throw new Error('Program link error: ' + gl.getProgramInfoLog(program));
      posBuf = gl.createBuffer();
      colBuf = gl.createBuffer();
      maskBuf = gl.createBuffer();
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
      gl.enable(gl.DEPTH_TEST);
      gl.clearColor(0.02, 0.05, 0.17, 1.0);
    }

    function getCameraBasis() {
      const cy = Math.cos(yaw), sy = Math.sin(yaw);
      const cp = Math.cos(pitch), sp = Math.sin(pitch);
      const eye = [
        target[0] + dist * cp * sy,
        target[1] + dist * sp,
        target[2] + dist * cp * cy,
      ];
      const forward = vec3Norm([target[0] - eye[0], target[1] - eye[1], target[2] - eye[2]]);
      const right = vec3Norm(vec3Cross(forward, [0, 1, 0]));
      const up = vec3Norm(vec3Cross(right, forward));
      return { eye, forward, right, up };
    }

    function currentCameraPayload() {
      const basis = getCameraBasis();
      return {
        name: sanitizeStem(nameInput.value),
        source: loadedSource,
        eye: basis.eye,
        target: [...target],
        up: basis.up,
        fov_y_deg: VIEW_FOVY_DEG,
        image_width: Math.max(1, canvas.width),
        image_height: Math.max(1, canvas.height),
      };
    }

    async function saveCurrentView() {
      const payload = {
        name: sanitizeStem(nameInput.value),
        save_dir: saveDirInput.value.trim(),
        save_depth: true,
        camera: currentCameraPayload(),
        preview_png_data_url: canvas.toDataURL('image/png'),
      };
      setStatus(`Saving ${payload.name} ...`);
      try {
        const response = await fetch('/api/save_view', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.error || 'save failed');
        }
        setStatus(
          `Saved ${result.name}\n` +
          `Folder: ${result.save_dir}\n` +
          `RGB: ${result.files.rendered_rgb}\n` +
          `Mask: ${result.files.mask_template}\n` +
          `Meta: ${result.files.metadata_json}`
        );
        nameInput.value = nextStem(result.name);
      } catch (err) {
        console.error(err);
        setStatus('Save failed: ' + err.message);
      }
    }

    function nextStem(current) {
      const m = /^(.*?)(?:_(\d+))?$/.exec(current);
      if (!m) return `${current}_001`;
      const base = m[1] || 'custom_view';
      const idx = m[2] ? Number(m[2]) + 1 : 1;
      return `${base}_${String(idx).padStart(3, '0')}`;
    }

    function refreshCameraInfo() {
      const payload = currentCameraPayload();
      cameraInfoEl.textContent = JSON.stringify(payload, null, 2);
    }

    function uploadPoints(data) {
      pointCount = data.pos.length / 3;
      hasData = pointCount > 0;
      gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
      gl.bufferData(gl.ARRAY_BUFFER, data.pos, gl.STATIC_DRAW);
      gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
      gl.bufferData(gl.ARRAY_BUFFER, data.col, gl.STATIC_DRAW);
      gl.bindBuffer(gl.ARRAY_BUFFER, maskBuf);
      gl.bufferData(gl.ARRAY_BUFFER, data.mask, gl.STATIC_DRAW);

      let minx=1e9, miny=1e9, minz=1e9, maxx=-1e9, maxy=-1e9, maxz=-1e9;
      for (let i = 0; i < data.pos.length; i += 3) {
        const x=data.pos[i], y=data.pos[i+1], z=data.pos[i+2];
        if (x<minx) minx=x; if (y<miny) miny=y; if (z<minz) minz=z;
        if (x>maxx) maxx=x; if (y>maxy) maxy=y; if (z>maxz) maxz=z;
      }
      target = [(minx+maxx)*0.5, (miny+maxy)*0.5, (minz+maxz)*0.5];
      const dx=maxx-minx, dy=maxy-miny, dz=maxz-minz;
      const radius=Math.max(1e-3, 0.5*Math.hypot(dx,dy,dz));
      sceneRadius = radius;
      dist = radius * 2.0;
      yaw = 0.0;
      pitch = 0.0;

      const masked = data.mask.reduce((a, b) => a + (b > 0.5 ? 1 : 0), 0);
      setStatus(
        `Loaded: ${pointCount.toLocaleString()} / ${data.sourceCount.toLocaleString()} vertices\n` +
        `Downsample stride: ${data.sampleStride}\n` +
        `Mask property: ${data.maskName}\n` +
        `Masked gaussians: ${masked.toLocaleString()}\n` +
        `Source: ${loadedSource}`
      );
      refreshCameraInfo();
    }

    async function parsePlyFile(fileOrResponse) {
      const arrayBuffer = await fileOrResponse.arrayBuffer();
      const decoder = new TextDecoder('utf-8');
      const probe = decoder.decode(arrayBuffer.slice(0, Math.min(arrayBuffer.byteLength, 2_000_000)));
      const header = parseHeader(probe);
      if (header.format === 'binary_little_endian') return parseBinaryVertices(arrayBuffer, header);
      if (header.format === 'ascii') {
        const allText = decoder.decode(arrayBuffer);
        const after = allText.indexOf('end_header');
        const body = allText.slice(after + 'end_header'.length);
        return parseAsciiVertices(body, header.vertexProps, header.vertexCount);
      }
      throw new Error('Only ascii and binary_little_endian are supported');
    }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = Math.max(1, canvas.clientWidth);
      const h = Math.max(1, canvas.clientHeight);
      const rw = Math.floor(w * dpr);
      const rh = Math.floor(h * dpr);
      if (canvas.width !== rw || canvas.height !== rh) {
        canvas.width = rw;
        canvas.height = rh;
      }
      gl.viewport(0, 0, canvas.width, canvas.height);
    }

    function render() {
      if (!gl) return;
      resize();
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      if (!hasData) {
        refreshCameraInfo();
        return;
      }
      const basis = getCameraBasis();
      const proj = mat4Perspective(Math.PI * VIEW_FOVY_DEG / 180.0, canvas.width / canvas.height, 0.01, 5000.0);
      const view = mat4LookAt(basis.eye, target, [0, 1, 0]);
      const mvp = mat4Mul(proj, view);
      gl.useProgram(program);
      const aPos = gl.getAttribLocation(program, 'aPos');
      const aCol = gl.getAttribLocation(program, 'aCol');
      const aMask = gl.getAttribLocation(program, 'aMask');
      const uMVP = gl.getUniformLocation(program, 'uMVP');
      const uPointSize = gl.getUniformLocation(program, 'uPointSize');
      const uMaskMode = gl.getUniformLocation(program, 'uMaskMode');
      gl.uniformMatrix4fv(uMVP, false, mvp);
      gl.uniform1f(uPointSize, Number(sizeRange.value));
      gl.uniform1i(uMaskMode, maskToggle.checked ? 1 : 0);
      gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
      gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
      gl.enableVertexAttribArray(aPos);
      gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
      gl.vertexAttribPointer(aCol, 3, gl.FLOAT, false, 0, 0);
      gl.enableVertexAttribArray(aCol);
      gl.bindBuffer(gl.ARRAY_BUFFER, maskBuf);
      gl.vertexAttribPointer(aMask, 1, gl.FLOAT, false, 0, 0);
      gl.enableVertexAttribArray(aMask);
      gl.drawArrays(gl.POINTS, 0, pointCount);
      refreshCameraInfo();
    }

    function animate() {
      render();
      requestAnimationFrame(animate);
    }

    async function loadFromResponse(response, sourceName) {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      loadedSource = sourceName;
      setStatus('Loading...');
      const parsed = await parsePlyFile(response);
      uploadPoints(parsed);
    }

    async function loadDefaultPly() {
      try {
        const response = await fetch('gs_ply/0000.ply');
        await loadFromResponse(response, 'gs_ply/0000.ply');
      } catch (err) {
        console.error(err);
        setStatus('Failed to load default ply: ' + err.message);
      }
    }

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadPng(filename) {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = filename;
      a.click();
    }

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        loadedSource = file.name;
        setStatus('Loading...');
        const parsed = await parsePlyFile(file);
        uploadPoints(parsed);
      } catch (err) {
        console.error(err);
        setStatus('Failed to load file: ' + err.message);
      }
    });

    loadDefaultBtn.addEventListener('click', loadDefaultPly);

    exportCameraBtn.addEventListener('click', () => {
      const payload = currentCameraPayload();
      downloadText(`${payload.name}.json`, JSON.stringify(payload, null, 2));
    });
    saveViewBtn.addEventListener('click', saveCurrentView);

    copyCameraBtn.addEventListener('click', async () => {
      const payload = currentCameraPayload();
      const text = JSON.stringify(payload, null, 2);
      try {
        await navigator.clipboard.writeText(text);
        setStatus(`Copied camera JSON for ${payload.name}`);
      } catch (err) {
        setStatus('Clipboard copy failed: ' + err.message);
      }
    });

    downloadPreviewBtn.addEventListener('click', () => {
      const stem = sanitizeStem(nameInput.value);
      downloadPng(`${stem}_viewer_preview.png`);
    });

    maskToggle.addEventListener('change', applyMaskMode);
    maskToggleBtn.addEventListener('click', () => {
      maskToggle.checked = !maskToggle.checked;
      applyMaskMode();
    });

    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      dragMode = (e.button === 2 || e.shiftKey) ? 'pan' : 'rotate';
    });
    window.addEventListener('mouseup', () => { dragging = false; });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      if (dragMode === 'rotate') {
        yaw -= dx * 0.005;
        pitch -= dy * 0.005;
        const lim = Math.PI * 0.49;
        pitch = Math.max(-lim, Math.min(lim, pitch));
      } else {
        const fovY = Math.PI * VIEW_FOVY_DEG / 180.0;
        const pxToWorld = (2.0 * dist * Math.tan(fovY * 0.5)) / Math.max(1, canvas.clientHeight);
        const { right, up } = getCameraBasis();
        const sx = -dx * pxToWorld;
        const sy = dy * pxToWorld;
        target[0] += right[0] * sx + up[0] * sy;
        target[1] += right[1] * sx + up[1] * sy;
        target[2] += right[2] * sx + up[2] * sy;
      }
    });
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const s = Math.exp(e.deltaY * 0.002);
      const minDist = Math.max(sceneRadius * 0.00005, 0.0002);
      const prevDist = dist;
      zoomBy(s);
      if (e.deltaY < 0 && prevDist <= minDist * 1.05 && dist <= minDist * 1.05) {
        const { forward } = getCameraBasis();
        const step = Math.max(sceneRadius * 0.002, 0.002);
        target[0] += forward[0] * step;
        target[1] += forward[1] * step;
        target[2] += forward[2] * step;
      }
    }, { passive: false });

    zoomInBtn.addEventListener('click', () => zoomBy(0.85));
    zoomOutBtn.addEventListener('click', () => zoomBy(1.18));
    window.addEventListener('keydown', (e) => {
      if (e.key === '+' || e.key === '=') zoomBy(0.85);
      if (e.key === '-' || e.key === '_') zoomBy(1.18);
    });
    window.addEventListener('resize', () => render());
    nameInput.addEventListener('input', refreshCameraInfo);

    try {
      initGL();
      applyMaskMode();
      refreshCameraInfo();
      animate();
      loadDefaultPly();
    } catch (err) {
      console.error(err);
      setStatus('Viewer init failed: ' + err.message);
    }
  </script>
</body>
</html>
